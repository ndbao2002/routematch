name: routematch-microservices

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: routematch_ms_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: routematch
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d routematch"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - routematch-net

  flyway:
    image: flyway/flyway:11
    container_name: routematch_ms_flyway
    command: -configFiles=/flyway/conf/flyway.conf migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../shared/database/flyway.conf:/flyway/conf/flyway.conf:ro
      - ../shared/database/migrations:/flyway/sql:ro
    networks:
      - routematch-net

  redis:
    image: redis:7-alpine
    container_name: routematch_ms_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - routematch-net

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    container_name: routematch_ms_kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - kafka:8082
    ports:
      - "19092:19092"
      - "9644:9644"
      - "18082:8082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15
    volumes:
      - kafka_data:/var/lib/redpanda/data
    networks:
      - routematch-net

  kafka-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    container_name: routematch_ms_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      rpk topic create Orders_Requested --brokers=kafka:9092 || true;
      rpk topic create Matched_Assignments --brokers=kafka:9092 || true;
      rpk topic create Offers_Created --brokers=kafka:9092 || true;
      rpk topic create Driver_Responses --brokers=kafka:9092 || true;
      rpk topic create Orders_Finalized --brokers=kafka:9092 || true;
      rpk topic create Orders_Failed --brokers=kafka:9092 || true;
      "
    networks:
      - routematch-net

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: routematch_ms_console
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      REDPANDA_ADMINAPI_ENABLED: "true"
      REDPANDA_ADMINAPI_URLS: http://kafka:9644
    ports:
      - "8081:8080"
    networks:
      - routematch-net

  driver-state:
    build:
      context: ../
      dockerfile: services/driver-state/Dockerfile
    container_name: routematch_ms_driver_state
    environment:
      - PORT=50051
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "50051:50051"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - routematch-net

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: routematch_ms_mlflow
    user: root
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --artifacts-destination /mlflow --serve-artifacts --allowed-hosts *
    networks:
      - routematch-net

  ml-batch:
    build:
      context: ../
      dockerfile: services/ml-batch/Dockerfile
    container_name: routematch_ms_ml_batch
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DRIVER_STATE_GRPC_ADDR=driver-state:50051
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - WEIGHT_PROB=1.0
      - WEIGHT_DISTANCE=0.1
      - PORT=8080
    volumes:
      - ../../models:/workspace/services/ml-batch/models
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      driver-state:
        condition: service_started
      mlflow:
        condition: service_started
    networks:
      - routematch-net

networks:
  routematch-net:
    driver: bridge

volumes:
  db_data:
  redis_data:
  kafka_data:
  mlflow_data:
